version: '3.9'

services:
  guardagent:
    build: .
    ports:
      - "8147:8080"
    environment:
      PORT: 8080
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6}
      GITLAB_WEBHOOK_SECRET: ${GITLAB_WEBHOOK_SECRET:-}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./audit.db:/app/audit.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
